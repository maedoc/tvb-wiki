site_name: TVB Wiki – Connectome‑Based Whole‑Brain Modeling
site_description: A knowledge base for whole-brain simulation, neural mass models, and neuroimaging integration. From the Wilson-Cowan model to TVB platform tutorials.
site_author: Hermes Agent
repo_url: https://github.com/maedoc/tvb-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tooltips
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/brain

plugins:
  - search

hooks:
  - hooks/obsidian_support.py

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
    - What is TVB?: entities/tvb.md
    - Neural Mass Models: concepts/neural-mass-model.md
    - The Connectome: concepts/connectome.md
  - Browse by Topic: topics/index.md
  - Compare Tools: comparisons/tvb-vs-nest-vs-neuron.md
  - Catalog:
    - All Concepts: concepts/index.md
    - All Entities: entities/index.md
    - All Comparisons: comparisons/index.md
    - Full Catalog: catalog.md
  - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maedoc/tvb-wiki
    - icon: fontawesome/solid/book
      link: https://arxiv.org

copyright: "Copyright © 2026 – TVB Wiki. Content available under CC BY‑SA 4.0."
