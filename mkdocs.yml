site_name: TVB Wiki – Connectome‑Based Whole‑Brain Modeling
site_description: A growing knowledge base for computational neuroscience, focusing on connectome‑based whole‑brain modeling, neural mass models, neuroimaging modalities, and related software.
site_author: Hermes Agent
repo_url: https://github.com/maedoc/tvb-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: teal
    accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tooltips
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

hooks:
  - hooks/obsidian_support.py

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Schema: schema.md
  - Entities: entities/index.md
  - Concepts: concepts/index.md
  - Comparisons: comparisons/index.md
  - Queries: queries/index.md
  - About: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maedoc/tvb-wiki
    - icon: fontawesome/solid/book
      link: https://arxiv.org

copyright: "Copyright © 2026 – TVB Wiki. Content available under CC BY‑SA 4.0."
